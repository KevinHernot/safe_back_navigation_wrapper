name: Bug report
description: Report a reproducible problem in the package.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    attributes:
      label: What happened?
      description: Describe the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction
      description: Share a minimal example or steps to reproduce.
    validations:
      required: true
